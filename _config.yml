# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.

locale                   : "es-CL"
site_theme               : "default"
title                    : "Gabriel Salgado Maldonado"
title_separator          : "-"
name                     : &name "Gabriel Salgado Maldonado"
description              : &description "Académico e investigador en voz, deglución, vía aérea y salud pública."
url                      : https://gsalgadoma.github.io
baseurl                  : ""
repository               : "gsalgadoma/gsalgadoma.github.io"

author:
  avatar           : "profile.png.jpg"
  name             : "Gabriel Salgado Maldonado"
  pronouns         : "he/him"
  bio              : "Académico · Investigador en voz, deglución, vía aérea y cuidados intensivos."
  location         : "Santiago, Chile"
  employer         : "Universidad de los Andes"
  uri              : "https://www.uandes.cl/personas/gabriel-salgado-maldonado/"
  email            : "gsalgadom@uandes.cl"
  googlescholar    : "https://scholar.google.com/citations?user=lUJ6RBoAAAAJ"
  orcid            : "https://orcid.org/0000-0002-4897-8863"
  researchgate     : "https://www.researchgate.net/profile/Gabriel-Salgado-Maldonado"
  github           : "gsalgadoma"
  instagram        : "fonoaudiologiainforma"
  twitter          : "gsalgadoma"

publication_category:
  books:
    title: 'Libros/Manuales'
  manuscripts:
    title: 'Articulos Científicos'
  conferences:
    title: 'Conferencias'

teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

include:
  - .htaccess
  - _pages
  - files
exclude:
  - .github
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: America/Santiago

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
